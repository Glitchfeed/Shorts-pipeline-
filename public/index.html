  .info-item .num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
  .info-item .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .progress-pct { font-size: 24px; font-weight: 700; font-family: 'Syne', sans-serif; color: var(--accent); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; width: 0%; transition: width 0.5s ease; }
  .step-log { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; max-height: 260px; overflow-y: auto; font-size: 11px; line-height: 2; }
  .log-item { color: var(--muted); }
  .log-item.current { color: var(--text); }
  .log-item.done-log { color: var(--success); }
